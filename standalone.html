/**
 * SaveManager - Menyimpan dan memuat data pemain via LocalStorage
 */
const SAVE_KEY = 'holdfish_save';

class SaveManager {

    /**
     * Buat data pemain baru
     */
    static createPlayer({ name, gender, avatar }) {
        const now = new Date().toISOString();
        const player = {
            character: {
                name,
                gender,
                avatar,
            },
            progress: {
                level: 1,
                exp: 0,
            },
            currency: {
                gold: 500,
                diamond: 0,
                hfish: 0,
            },
            equipment: {
                rod: 'wood_rod',
                hook: 'basic_hook',
                bait: 'worm_bait',
                baitAmount: 20,
                boat: null,
            },
            location: {
                currentSpot: 'village_pond',
            },
            inventory: [],
            fishCollection: [],
            achievements: [],
            unlockedSpots: ['village_pond'],
            stats: {
                totalFish: 0,
                biggestFish: 0,
                playTime: 0,
            },
            settings: {
                musicVolume: 100,
                sfxVolume: 100,
                language: 'english',
            },
            meta: {
                tutorialFinished: false,
                createdDate: now,
                lastLogin: now,
            },
        };
        return player;
    }

    /**
     * Simpan data ke LocalStorage
     */
    static save(playerData) {
        try {
            playerData.meta.lastLogin = new Date().toISOString();
            localStorage.setItem(SAVE_KEY, JSON.stringify(playerData));
            return true;
        } catch (e) {
            console.warn('[SaveManager] Gagal save:', e);
            return false;
        }
    }

    /**
     * Muat data dari LocalStorage
     */
    static load() {
        try {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return null;
            return JSON.parse(raw);
        } catch (e) {
            console.warn('[SaveManager] Gagal load:', e);
            return null;
        }
    }

    /**
     * Hapus data save
     */
    static deleteSave() {
        localStorage.removeItem(SAVE_KEY);
    }

    /**
     * Cek apakah ada data save
     */
    static hasSave() {
        return localStorage.getItem(SAVE_KEY) !== null;
    }
}

/**
 * PlayerManager - Mengelola data pemain aktif
 */

class PlayerManager {

    constructor() { this._data = null; }

    getData()     { return this._data; }
    load()        { this._data = SaveManager.load(); return this._data; }
    save()        { if (this._data) SaveManager.save(this._data); }
    hasData()     { return this._data !== null; }

    // ==================== IDENTITY ====================
    getName()     { return this._data?.character?.name ?? ''; }
    getGender()   { return this._data?.character?.gender ?? 'male'; }
    getAvatar()   { return this._data?.character?.avatar ?? 0; }

    // ==================== PROGRESS ====================
    getLevel()    { return this._data?.progress?.level ?? 1; }
    getExp()      { return this._data?.progress?.exp ?? 0; }
    addExp(amount) {
        this._data.progress.exp += amount;
        const needed = this._data.progress.level * 100;
        while (this._data.progress.exp >= needed) {
            this._data.progress.exp -= needed;
            this._data.progress.level++;
        }
        this.save();
    }

    // ==================== CURRENCY ====================
    getGold()     { return this._data?.currency?.gold ?? 0; }
    getDiamond()  { return this._data?.currency?.diamond ?? 0; }
    getHfish()    { return this._data?.currency?.hfish ?? 0; }
    addGold(amount)    { this._data.currency.gold += amount; this.save(); }
    addDiamond(amount) { this._data.currency.diamond += amount; this.save(); }

    // ==================== EQUIPMENT ====================
    getRod()        { return this._data?.equipment?.rod ?? ''; }
    getHook()       { return this._data?.equipment?.hook ?? ''; }
    getBait()       { return this._data?.equipment?.bait ?? ''; }
    getBaitAmount() { return this._data?.equipment?.baitAmount ?? 0; }
    getBoat()       { return this._data?.equipment?.boat ?? null; }
    useBait() {
        if (this._data.equipment.baitAmount > 0) {
            this._data.equipment.baitAmount--;
            this.save();
            return true;
        }
        return false;
    }
    addBait(baitId, amount) {
        if (this._data.equipment.bait === baitId) {
            this._data.equipment.baitAmount += amount;
        } else {
            this._data.equipment.bait = baitId;
            this._data.equipment.baitAmount = amount;
        }
        this.save();
    }
    setHook(hookId) {
        this._data.equipment.hook = hookId;
        this.save();
    }
    setRod(rodId) {
        this._data.equipment.rod = rodId;
        this.save();
    }

    // ==================== OWNED ITEMS ====================
    getOwnedRods()  { return this._data?.rods ?? ['wood_rod']; }
    getOwnedHooks() { return this._data?.hooks ?? ['basic_hook']; }
    addOwnedRod(rodId) {
        if (!this._data.rods) this._data.rods = ['wood_rod'];
        if (!this._data.rods.includes(rodId)) this._data.rods.push(rodId);
        this.save();
    }
    addOwnedHook(hookId) {
        if (!this._data.hooks) this._data.hooks = ['basic_hook'];
        if (!this._data.hooks.includes(hookId)) this._data.hooks.push(hookId);
        this.save();
    }

    // ==================== LOCATION ====================
    getCurrentSpot() { return this._data?.location?.currentSpot ?? ''; }
    setCurrentSpot(spotId) { this._data.location.currentSpot = spotId; this.save(); }

    // ==================== INVENTORY ====================
    getInventory()  { return this._data?.inventory ?? []; }
    addToInventory(item) {
        if (!this._data.inventory) this._data.inventory = [];
        this._data.inventory.push(item);
        this.save();
    }
    removeFromInventory(index) {
        this._data.inventory.splice(index, 1);
        this.save();
    }

    // ==================== FISH COLLECTION ====================
    getCollection() { return this._data?.fishCollection ?? []; }
    addToCollection(fishId, weight) {
        if (!this._data.fishCollection) this._data.fishCollection = [];
        const existing = this._data.fishCollection.find(c => c.id === fishId);
        if (existing) {
            existing.caught++;
            if (weight > existing.biggestWeight) existing.biggestWeight = weight;
            existing.lastCaught = new Date().toISOString();
        } else {
            this._data.fishCollection.push({
                id: fishId,
                caught: 1,
                biggestWeight: weight,
                firstCaught: new Date().toISOString(),
                lastCaught: new Date().toISOString(),
            });
        }
        this.save();
    }
    isNewSpecies(fishId) {
        return !this._data.fishCollection?.some(c => c.id === fishId);
    }

    // ==================== STATS ====================
    getStats()      { return this._data?.stats ?? {}; }
    addFishStat(weight) {
        this._data.stats.totalFish++;
        if (weight > this._data.stats.biggestFish) this._data.stats.biggestFish = weight;
        this.save();
    }

    // ==================== SPOTS ====================
    getUnlockedSpots() { return this._data?.unlockedSpots ?? []; }

    // ==================== SETTINGS ====================
    getSettings()   { return this._data?.settings ?? {}; }
}

/**
 * InventoryManager - Mengelola seluruh inventory pemain
 */

class InventoryManager {

    // ==================== FISH ====================

    static getAllFish() {
        return PlayerManager.getInventory().filter(i => i.type === 'fish');
    }

    static addFish(fishData, weight) {
        PlayerManager.addToInventory({
            type: 'fish',
            fishId: fishData.id,
            name: fishData.name,
            rarity: fishData.rarity,
            weight,
            price: fishData.price,
            caughtAt: new Date().toISOString(),
            favorite: false,
            spot: PlayerManager.getCurrentSpot(),
        });
    }

    static removeFish(index) {
        const allFish = this.getAllFish();
        const inv = PlayerManager.getInventory();
        const realIndex = inv.indexOf(allFish[index]);
        if (realIndex !== -1) PlayerManager.removeFromInventory(realIndex);
    }

    static favoriteFish(index) {
        const allFish = this.getAllFish();
        const inv = PlayerManager.getInventory();
        const realIndex = inv.indexOf(allFish[index]);
        if (realIndex !== -1) {
            inv[realIndex].favorite = !inv[realIndex].favorite;
            PlayerManager.save();
        }
    }

    static getFishByRarity(rarity) {
        return this.getAllFish().filter(f => f.rarity === rarity);
    }

    static getLargestFish() {
        const allFish = this.getAllFish();
        if (allFish.length === 0) return null;
        return allFish.reduce((max, f) => f.weight > max.weight ? f : max, allFish[0]);
    }

    static searchFish(query) {
        const q = query.toLowerCase();
        return this.getAllFish().filter(f => f.name.toLowerCase().includes(q));
    }

    static sortFish(fishList, sortBy) {
        const sorted = [...fishList];
        switch (sortBy) {
            case 'newest':      sorted.sort((a, b) => new Date(b.caughtAt) - new Date(a.caughtAt)); break;
            case 'oldest':      sorted.sort((a, b) => new Date(a.caughtAt) - new Date(b.caughtAt)); break;
            case 'highestPrice': sorted.sort((a, b) => b.price - a.price); break;
            case 'lowestPrice':  sorted.sort((a, b) => a.price - b.price); break;
            case 'largestWeight': sorted.sort((a, b) => b.weight - a.weight); break;
            case 'smallestWeight': sorted.sort((a, b) => a.weight - b.weight); break;
            case 'nameAZ':      sorted.sort((a, b) => a.name.localeCompare(b.name)); break;
            case 'nameZA':      sorted.sort((a, b) => b.name.localeCompare(a.name)); break;
        }
        return sorted;
    }

    // ==================== BAIT ====================

    static getBaitInventory() {
        return PlayerManager.getData().equipment;
    }

    // ==================== HOOKS ====================

    static getOwnedHooks() {
        return PlayerManager.getData().hooks ?? ['basic_hook'];
    }

    // ==================== RODS ====================

    static getOwnedRods() {
        return PlayerManager.getData().rods ?? ['wood_rod'];
    }

    // ==================== COLLECTION ====================

    static getCollection() {
        return PlayerManager.getCollection();
    }

    static isCollected(fishId) {
        return PlayerManager.getCollection().some(c => c.id === fishId);
    }

    static getCollectionStats() {
        const allFish = DataManager.getFish();
        const collected = this.getCollection();
        const total = allFish.length;
        const done = collected.length;

        const rarityCount = {};
        const rarityTotal = {};
        allFish.forEach(f => {
            rarityTotal[f.rarity] = (rarityTotal[f.rarity] || 0) + 1;
        });
        collected.forEach(c => {
            const fish = DataManager.getFishByID(c.id);
            if (fish) rarityCount[fish.rarity] = (rarityCount[fish.rarity] || 0) + 1;
        });

        return { total, done, rarityCount, rarityTotal };
    }
}

/**
 * MarketManager - Menjual ikan
 */

class MarketManager {

    /**
     * Menjual 1 ikan dari inventory berdasarkan index
     * @returns {{ success: boolean, goldEarned: number, message: string }}
     */
    static sellOne(index) {
        const inv = PlayerManager.getInventory();
        if (index < 0 || index >= inv.length) {
            return { success: false, goldEarned: 0, message: 'Invalid item.' };
        }
        const item = inv[index];
        const fishData = DataManager.getFishByID(item.fishId);
        if (!fishData) {
            return { success: false, goldEarned: 0, message: 'Fish data not found.' };
        }
        const gold = fishData.price;
        PlayerManager.removeFromInventory(index);
        PlayerManager.addGold(gold);
        return { success: true, goldEarned: gold, message: `Sold ${fishData.name} for 🪙${gold}` };
    }

    /**
     * Menjual semua ikan kecuali yang di-favorite
     * @returns {{ totalGold: number, soldCount: number }}
     */
    static sellAll() {
        let totalGold = 0;
        let soldCount = 0;
        const inv = PlayerManager.getInventory();
        // Sell from end to start to avoid index shifting
        for (let i = inv.length - 1; i >= 0; i--) {
            if (inv[i].favorite) continue;
            const fishData = DataManager.getFishByID(inv[i].fishId);
            if (fishData) {
                totalGold += fishData.price;
                PlayerManager.removeFromInventory(i);
                soldCount++;
            }
        }
        PlayerManager.addGold(totalGold);
        return { totalGold, soldCount };
    }
}

/**
 * ShopManager - Membeli umpan dan item
 */

class ShopManager {

    /**
     * Membeli umpan
     * @returns {{ success: boolean, message: string }}
     */
    static buyBait(baitId) {
        const bait = DataManager.getBaitByID(baitId);
        if (!bait) return { success: false, message: 'Bait not found.' };

        if (PlayerManager.getGold() < bait.price) {
            return { success: false, message: 'Not enough Gold.' };
        }

        PlayerManager.addGold(-bait.price);
        PlayerManager.addBait(baitId, 1);
        return { success: true, message: `Bought ${bait.name} for 🪙${bait.price}` };
    }

    /**
     * Membeli kail
     */
    static buyHook(hookId) {
        const hook = DataManager.getHookByID(hookId);
        if (!hook) return { success: false, message: 'Hook not found.' };
        if (PlayerManager.getGold() < hook.price) {
            return { success: false, message: 'Not enough Gold.' };
        }
        PlayerManager.addGold(-hook.price);
        PlayerManager.setHook(hookId);
        return { success: true, message: `Bought ${hook.name}` };
    }
}

/**
 * FishingSystem - Logika inti memancing
 * Semua data berasal dari DataManager.
 */

class FishingSystem {

    /**
     * Proses memancing. Mengembalikan hasil tangkapan.
     * @returns {{ success: boolean, fish: object|null, weight: number, isNew: boolean, message: string }}
     */
    static processCatch() {
        const playerData = PlayerManager.getData();
        const spotId     = playerData.location.currentSpot;
        const baitId     = playerData.equipment.bait;
        const hookId     = playerData.equipment.hook;
        const rodId      = playerData.equipment.rod;
        const level      = playerData.progress.level;

        // Ambil data dari DataManager
        const spot  = DataManager.getSpotByID(spotId);
        const bait  = DataManager.getBaitByID(baitId);
        const hook  = DataManager.getHookByID(hookId);
        const rod   = DataManager.getRodByID(rodId);
        const weather = this._getCurrentWeather();
        const season  = this._getCurrentSeason();
        const time    = this._getCurrentTime();

        // 1. Filter ikan berdasarkan Spot
        let candidates = DataManager.getFish().filter(f => {
            return f.location.includes(spotId);
        });

        // 2. Filter berdasarkan Level
        candidates = candidates.filter(f => f.unlockLevel <= level);

        // 3. Filter berdasarkan Waktu
        candidates = candidates.filter(f => {
            return !f.preferredTime || f.preferredTime.includes(time);
        });

        // 4. Filter berdasarkan Musim
        candidates = candidates.filter(f => {
            return !f.preferredSeason || f.preferredSeason.includes(season);
        });

        // 5. Filter berdasarkan Cuaca
        candidates = candidates.filter(f => {
            return !f.preferredWeather || f.preferredWeather.includes(weather);
        });

        // Jika tidak ada kandidat
        if (candidates.length === 0) {
            return { success: false, fish: null, weight: 0, isNew: false, message: 'Nothing was caught.' };
        }

        // 6. Hitung peluang per ikan (weighted random)
        const weights = candidates.map(fish => {
            let w = this._rarityWeight(fish.rarity);

            // Bonus umpan favorit
            if (bait && fish.preferredBait.includes(baitId)) {
                w += bait.rarityBonus || 0;
                w += 20;
            }

            // Bonus joran
            if (rod) {
                w += rod.luckBonus || 0;
            }

            // Bonus kail
            if (hook) {
                w += Math.floor((hook.catchRate - 50) / 5);
            }

            // Penalty cuaca buruk
            const weatherData = DataManager.getWeatherByID(weather);
            if (weatherData) {
                w = Math.floor(w * weatherData.modifier);
            }

            // Bonus musim
            const seasonData = DataManager.getSeasonByID(season);
            if (seasonData && fish.rarity === seasonData.bonusType) {
                w = Math.floor(w * seasonData.bonus);
            }

            return Math.max(w, 1);
        });

        // 7. Pilih ikan secara acak berdasarkan bobot
        const chosenFish = this._weightedRandom(candidates, weights);

        // 8. Tentukan ukuran ikan
        const weight = this._calculateWeight(chosenFish);

        // 9. Cek apakah spesies baru
        const isNew = PlayerManager.isNewSpecies(chosenFish.id);

        return {
            success: true,
            fish: chosenFish,
            weight,
            isNew,
            message: isNew ? 'NEW SPECIES DISCOVERED!' : 'Already collected.',
        };
    }

    /**
     * Bobot dasar berdasarkan rarity
     */
    static _rarityWeight(rarity) {
        const map = { common: 50, uncommon: 30, rare: 15, epic: 4, legendary: 1 };
        return map[rarity] || 10;
    }

    /**
     * Pilih item secara acak berdasarkan bobot
     */
    static _weightedRandom(items, weights) {
        const total = weights.reduce((sum, w) => sum + w, 0);
        let rand = Math.random() * total;
        for (let i = 0; i < items.length; i++) {
            rand -= weights[i];
            if (rand <= 0) return items[i];
        }
        return items[items.length - 1];
    }

    /**
     * Hitung berat ikan antara minWeight dan maxWeight
     */
    static _calculateWeight(fish) {
        const min = fish.minWeight || 0.1;
        const max = fish.maxWeight || 5.0;
        const raw = min + Math.random() * (max - min);
        return Math.round(raw * 100) / 100;
    }

    /**
     * Waktu dalam game (dummy - nanti dari TimeSystem)
     */
    static _getCurrentTime() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 8)  return 'morning';
        if (hour >= 8 && hour < 17) return 'afternoon';
        if (hour >= 17 && hour < 20) return 'evening';
        return 'night';
    }

    /**
     * Cuaca dalam game (dummy - nanti dari WeatherSystem)
     */
    static _getCurrentWeather() {
        const weathers = ['sunny', 'cloudy', 'rain', 'fog'];
        return weathers[Math.floor(Math.random() * weathers.length)];
    }

    /**
     * Musim dalam game (dummy - nanti dari SeasonSystem)
     */
    static _getCurrentSeason() {
        const month = new Date().getMonth();
        if (month >= 2 && month <= 4)  return 'spring';
        if (month >= 5 && month <= 7)  return 'summer';
        if (month >= 8 && month <= 10) return 'autumn';
        return 'winter';
    }
}

            this.tweens.add({ targets: this.tapText, alpha: 1, duration: 400 });
            this.tweens.add({
                targets: this.tapText,
                alpha: 0.3,
                duration: 600,
                yoyo: true,
                repeat: -1,
            });
        });

        this.time.delayedCall(1800, () => {
            this.input.on('pointerdown', goNext);
        });
    }
}


class CharacterCreationScene extends Phaser.Scene {

        this.avatarBgs = [];

            const bg = this.add.rectangle(x, 380, 48, 48, colors[idx], 0.4)
                .setStrokeStyle(2, idx === 0 ? 0xffffff : 0x555555)
                .setInteractive({ useHandCursor: true });

            bg.on('pointerdown', () => {
                this.selectedAvatar = idx;
                this.avatarBgs.forEach((b, j) => b.setStrokeStyle(2, j === idx ? 0xffffff : 0x555555));
            });
            this.avatarBgs.push(bg);
        });

        // Error
        this.errorText = this.add.text(w / 2, 440, '', { fontSize: '13px', color: '#ff6b6b' }).setOrigin(0.5).setAlpha(0);

        // Start button
        const startBtn = this.add.text(w / 2, 510, '\uD83C\uDFA3  START JOURNEY', {
            fontSize: '18px', color: '#ffffff', backgroundColor: '#2a7a3a',
            padding: { x: 24, y: 12 }, fontStyle: 'bold',
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        startBtn.on('pointerdown', () => this._onStart());
    }

    _showNameInput() {
        // Buat DOM input element
        const gameCanvas = this.game.canvas;
        const rect = gameCanvas.getBoundingClientRect();

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Masukkan nama (3-16)';
        input.maxLength = 16;
        input.value = this.playerName;
        input.style.cssText = `
            position: fixed;
            top: ${rect.top + rect.height * 0.17}px;
            left: ${rect.left + rect.width * 0.15}px;
            width: ${rect.width * 0.7}px;
            height: 40px;
            font-size: 18px;
            padding: 8px 12px;
            border: 2px solid #4a9eff;
            border-radius: 8px;
            background: #1a2a3a;
            color: #ffffff;
            text-align: center;
            z-index: 1000;
            outline: none;
        `;

        document.body.appendChild(input);
        input.focus();

        const cleanup = () => {
            if (input.parentNode) {
                this.playerName = input.value.trim();
                this.nameText.setText(this.playerName || 'Tap here to type...');
                this.nameText.setStyle({ color: this.playerName ? '#ffffff' : '#888888' });
                input.remove();
            }
        };

        input.addEventListener('blur', cleanup);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') input.blur();
        });
    }

    _setGender(g) {
        this.selectedGender = g;
        this.maleBtn.setStyle({ backgroundColor: g === 'male' ? '#4a9eff' : '#3a4a5a' });
        this.femaleBtn.setStyle({ backgroundColor: g === 'female' ? '#4a9eff' : '#3a4a5a' });
    }

    _onStart() {
        if (this.playerName.length < 3) {
            this.errorText.setText('Nama minimal 3 karakter').setAlpha(1);
            this.time.delayedCall(2000, () => this.errorText.setAlpha(0));
            return;
        }

        const player = SaveManager.createPlayer({
            name: this.playerName,
            gender: this.selectedGender,
            avatar: this.selectedAvatar,
        });
        SaveManager.save(player);
        PlayerManager.load();
        this.scene.start('FishingHubScene');
    }
}

            { label: '🔧 Rod Workshop',    scene: 'RodWorkshopScene' },

            { label: '📦 Inventory',       scene: 'InventoryScene' },

            { label: '⚙️ Settings',        scene: 'SettingsScene' },
        ];

        const btnH = 50;
        const gap = 8;

                bg.on('pointerout', () => bg.setFillStyle(0x2a4a3a));

class FishingScene extends Phaser.Scene {

    constructor() {
        super({ key: 'FishingScene' });
        this.isFishing = false;
        this.infoTexts = {};
    }

    create() {
        PlayerManager.load();
        this.isFishing = false;

        const w = this.cameras.main.width;
        const h = this.cameras.main.height;
        this.cameras.main.setBackgroundColor(0x1a2a3a);

        this._buildHUD(w, h);
        this._buildStartButton(w, h);
        this._buildBackButton(w, h);
    }

    _buildHUD(w, h) {
        const pd = PlayerManager.getData();
        const spot = DataManager.getSpotByID(pd.location.currentSpot);
        const rod  = DataManager.getRodByID(pd.equipment.rod);
        const hook = DataManager.getHookByID(pd.equipment.hook);
        const bait = DataManager.getBaitByID(pd.equipment.bait);

        // Spot name
        this.add.text(w / 2, 30, spot?.name ?? 'Unknown Spot', {
            fontSize: '22px', color: '#4ac5ff', fontStyle: 'bold',
        }).setOrigin(0.5);

        // Player info panel (left)
        const ly = 80;
        const style = { fontSize: '13px', color: '#cccccc' };
        this.add.text(20, ly,      `🧑 ${pd.character.name}`, style);
        this.add.text(20, ly + 20, `Lv.${pd.progress.level}`, style);
        this.add.text(20, ly + 40, `🪙 ${pd.currency.gold}`,   { fontSize: '13px', color: '#ffd700' });
        this.add.text(20, ly + 60, `💎 ${pd.currency.diamond}`, { fontSize: '13px', color: '#00ccff' });
        this.add.text(20, ly + 80, `🐟 ${pd.currency.hfish}`,  { fontSize: '13px', color: '#00ff88' });

        // Equipment panel (right)
        const rx = w - 180;
        this.add.text(rx, ly,      `🎣 ${rod?.name ?? '-'}`, style);
        this.add.text(rx, ly + 20, `🪝 ${hook?.name ?? '-'}`, style);
        this.add.text(rx, ly + 40, `🪱 ${bait?.name ?? '-'}`, style);
        this.add.text(rx, ly + 60, `📦 Bait: ${pd.equipment.baitAmount}`, style);

        // Environment info
        const cy = ly + 110;
        this.infoTexts.weather = this.add.text(w / 2, cy,      '', { fontSize: '12px', color: '#aabbcc' }).setOrigin(0.5);
        this.infoTexts.season  = this.add.text(w / 2, cy + 18, '', { fontSize: '12px', color: '#aabbcc' }).setOrigin(0.5);
        this.infoTexts.time    = this.add.text(w / 2, cy + 36, '', { fontSize: '12px', color: '#aabbcc' }).setOrigin(0.5);

        this._updateEnvironmentInfo();
    }

    _updateEnvironmentInfo() {
        const time = FishingSystem._getCurrentTime();
        const weather = FishingSystem._getCurrentWeather();
        const season = FishingSystem._getCurrentSeason();
        const weatherData = DataManager.getWeatherByID(weather);
        const seasonData  = DataManager.getSeasonByID(season);

        this.infoTexts.weather.setText(`☁ Weather: ${weatherData?.name ?? weather}`);
        this.infoTexts.season.setText(`🍂 Season: ${seasonData?.name ?? season}`);
        this.infoTexts.time.setText(`🕐 Time: ${time}`);
    }

    _buildStartButton(w, h) {
        this.startBtn = this.add.text(w / 2, h - 120, '🎣  START FISHING', {
            fontSize: '20px', color: '#ffffff',
            backgroundColor: '#2a7a3a',
            padding: { x: 28, y: 12 },
            fontStyle: 'bold',
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        this.startBtn.on('pointerdown', () => this._onStartFishing());
        this.startBtn.on('pointerover', () => {
            if (!this.isFishing) this.startBtn.setStyle({ backgroundColor: '#3a9a4a' });
        });
        this.startBtn.on('pointerout', () => {
            if (!this.isFishing) this.startBtn.setStyle({ backgroundColor: '#2a7a3a' });
        });
    }

    _buildBackButton(w, h) {
        const backBtn = this.add.text(20, h - 30, '← Back', {
            fontSize: '15px', color: '#888888',
        }).setInteractive({ useHandCursor: true });
        backBtn.on('pointerdown', () => this.scene.start('FishingHubScene'));
    }

    _onStartFishing() {
        if (this.isFishing) return;

        if (PlayerManager.getBaitAmount() <= 0) {
            this._showMessage("You don't have bait.");
            return;
        }

        PlayerManager.useBait();
        this.isFishing = true;
        this.startBtn.setStyle({ backgroundColor: '#333333' });
        this.startBtn.setText('⏳ Fishing...');
        this.startBtn.disableInteractive();

        this.time.delayedCall(5000, () => {
            this._processResult();
        });
    }

    _processResult() {
        const result = FishingSystem.processCatch();

        if (result.success) {
            InventoryManager.addFish(result.fish, result.weight);
            PlayerManager.addToCollection(result.fish.id, result.weight);
            PlayerManager.addFishStat(result.weight);
            const expGain = Math.floor(result.fish.price / 2) + 10;
            PlayerManager.addExp(expGain);
            this._showCatchPopup(result.fish, result.weight, result.isNew);
        } else {
            this._showMessage(result.message);
        }
    }

    _showCatchPopup(fish, weight, isNew) {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;
        const rarityColors = { common: '#aaaaaa', uncommon: '#55cc55', rare: '#5599ff', epic: '#aa55ff', legendary: '#ffaa00' };

        const dim = this.add.rectangle(w / 2, h / 2, w, h, 0x000000, 0.7).setInteractive();
        const panel = this.add.rectangle(w / 2, h / 2, w - 60, 280, 0x1a2a3a).setStrokeStyle(2, 0x4a9eff);

        const elements = [];
        let y = h / 2 - 110;

        elements.push(this.add.text(w / 2, y, isNew ? '🎉 NEW SPECIES!' : '🐟 Fish Caught!', {
            fontSize: '18px', color: isNew ? '#ffd700' : '#ffffff', fontStyle: 'bold',
        }).setOrigin(0.5)); y += 30;

        elements.push(this.add.text(w / 2, y, fish.name, {
            fontSize: '22px', color: rarityColors[fish.rarity] || '#ffffff', fontStyle: 'bold',
        }).setOrigin(0.5)); y += 28;

        elements.push(this.add.text(w / 2, y, `${fish.rarity.toUpperCase()} · ${weight.toFixed(2)} kg`, {
            fontSize: '13px', color: '#cccccc',
        }).setOrigin(0.5)); y += 22;

        elements.push(this.add.text(w / 2, y, `Sell Price: 🪙 ${fish.price}`, {
            fontSize: '14px', color: '#ffd700',
        }).setOrigin(0.5)); y += 20;

        elements.push(this.add.text(w / 2, y, fish.description, {
            fontSize: '11px', color: '#888888', wordWrap: { width: w - 100 }, align: 'center',
        }).setOrigin(0.5)); y += 30;

        const expGain = Math.floor(fish.price / 2) + 10;
        elements.push(this.add.text(w / 2, y, `+${expGain} EXP`, {
            fontSize: '13px', color: '#00ff88',
        }).setOrigin(0.5));

        const okBtn = this.add.text(w / 2, h / 2 + 110, 'OK', {
            fontSize: '16px', color: '#ffffff', backgroundColor: '#2a7a3a',
            padding: { x: 36, y: 10 },
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        okBtn.on('pointerdown', () => {
            dim.destroy(); panel.destroy(); okBtn.destroy();
            elements.forEach(e => e.destroy());
            this.scene.restart();
        });
    }

    _showMessage(msg) {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;

        const dim = this.add.rectangle(w / 2, h / 2, w, h, 0x000000, 0.6).setInteractive();
        const panel = this.add.rectangle(w / 2, h / 2, w - 80, 120, 0x1a2a3a).setStrokeStyle(2, 0xff6b6b);

        const text = this.add.text(w / 2, h / 2 - 15, msg, {
            fontSize: '16px', color: '#ff6b6b', fontStyle: 'bold',
        }).setOrigin(0.5);

        const okBtn = this.add.text(w / 2, h / 2 + 30, 'OK', {
            fontSize: '14px', color: '#ffffff', backgroundColor: '#aa3333',
            padding: { x: 28, y: 8 },
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        okBtn.on('pointerdown', () => {
            dim.destroy(); panel.destroy(); text.destroy(); okBtn.destroy();
            this.isFishing = false;
            this.startBtn.setStyle({ backgroundColor: '#2a7a3a' });
            this.startBtn.setText('🎣  START FISHING');
            this.startBtn.setInteractive({ useHandCursor: true });
        });
    }
}


class InventoryScene extends Phaser.Scene {
    constructor() {
        super({ key: 'InventoryScene' });
        this.currentTab = 'fish';
        this.currentSort = 'newest';
        this.currentFilter = null;
        this.searchQuery = '';
    }

    create() {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;
        this.cameras.main.setBackgroundColor(0x1a2a3a);

        this.add.text(w / 2, 20, '📦 INVENTORY', { fontSize: '20px', color: '#4ac5ff', fontStyle: 'bold' }).setOrigin(0.5);

        this._buildTabs(w);
        this._buildSortBar(w);
        this._buildFilterBar(w);
        this._buildSearchBar(w);
        this._buildFishList(w, h);
        this._buildBackButton(h);
    }

    _buildTabs(w) {
        const tabs = ['fish', 'bait', 'hooks', 'rods', 'boat', 'special', 'currency'];
        const tabW = w / tabs.length;
        tabs.forEach((tab, i) => {
            const x = tabW * i + tabW / 2;
            const btn = this.add.text(x, 50, tab.toUpperCase(), {
                fontSize: '10px', color: this.currentTab === tab ? '#ffffff' : '#666666',
                backgroundColor: this.currentTab === tab ? '#2a5a3a' : '#1a2a3a',
                padding: { x: 4, y: 4 },
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            btn.on('pointerdown', () => { this.currentTab = tab; this.scene.restart(); });
        });
    }

    _buildSortBar(w) {
        if (this.currentTab !== 'fish') return;
        const sorts = ['newest', 'oldest', 'highestPrice', 'lowestPrice', 'largestWeight', 'smallestWeight', 'nameAZ', 'nameZA'];
        const labels = ['New', 'Old', '$↓', '$↑', 'Wt↓', 'Wt↑', 'A-Z', 'Z-A'];
        const btnW = w / sorts.length;
        sorts.forEach((s, i) => {
            const x = btnW * i + btnW / 2;
            const btn = this.add.text(x, 75, labels[i], {
                fontSize: '10px', color: this.currentSort === s ? '#ffffff' : '#888888',
                backgroundColor: this.currentSort === s ? '#3a4a5a' : '#1a2a3a',
                padding: { x: 4, y: 3 },
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            btn.on('pointerdown', () => { this.currentSort = s; this.scene.restart(); });
        });
    }

    _buildFilterBar(w) {
        if (this.currentTab !== 'fish') return;
        const filters = [null, 'common', 'uncommon', 'rare', 'epic', 'legendary'];
        const labels = ['All', 'Cmn', 'Unc', 'Rar', 'Epi', 'Leg'];
        const colors = ['#ffffff', '#aaaaaa', '#55cc55', '#5599ff', '#aa55ff', '#ffaa00'];
        const btnW = w / filters.length;
        filters.forEach((f, i) => {
            const x = btnW * i + btnW / 2;
            const btn = this.add.text(x, 96, labels[i], {
                fontSize: '10px', color: this.currentFilter === f ? '#ffffff' : colors[i],
                backgroundColor: this.currentFilter === f ? '#3a4a5a' : '#1a2a3a',
                padding: { x: 4, y: 3 },
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            btn.on('pointerdown', () => { this.currentFilter = f; this.scene.restart(); });
        });
    }

    _buildSearchBar(w) {
        if (this.currentTab !== 'fish') return;
        const bg = this.add.rectangle(w / 2, 118, w - 40, 26, 0x1a2a3a).setStrokeStyle(1, 0x3a4a5a);
        this.add.text(w / 2 - 100, 118, '🔍', { fontSize: '12px' }).setOrigin(0, 0.5);
        this.add.text(w / 2 - 80, 118, this.searchQuery || 'Search fish...', {
            fontSize: '11px', color: this.searchQuery ? '#ffffff' : '#666666',
        }).setOrigin(0, 0.5);
        bg.setInteractive({ useHandCursor: true });
        bg.on('pointerdown', () => {
            const q = prompt('Search fish by name:', this.searchQuery || '');
            if (q !== null) { this.searchQuery = q.trim(); this.scene.restart(); }
        });
    }

    _buildFishList(w, h) {
        if (this.currentTab !== 'fish') {
            this.add.text(w / 2, h / 2, 'Coming Soon', { fontSize: '18px', color: '#555555' }).setOrigin(0.5);
            return;
        }

        let fish = InventoryManager.getAllFish();
        if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            fish = fish.filter(f => f.name.toLowerCase().includes(q));
        }
        if (this.currentFilter) fish = fish.filter(f => f.rarity === this.currentFilter);
        fish = InventoryManager.sortFish(fish, this.currentSort);

        const startY = 140;
        const slotH = 48;
        const maxSlots = Math.floor((h - startY - 50) / slotH);
        const rarityColors = { common: 0xaaaaaa, uncommon: 0x55cc55, rare: 0x5599ff, epic: 0xaa55ff, legendary: 0xffaa00 };

        fish.slice(0, maxSlots).forEach((f, i) => {
            const y = startY + i * slotH;
            this.add.rectangle(w / 2, y + 18, w - 20, 42, 0x1a2a3a, 0.8);
            this.add.rectangle(10, y + 18, 4, 38, rarityColors[f.rarity] || 0xaaaaaa);
            this.add.text(22, y + 6, `${f.favorite ? '⭐ ' : ''}${f.name}`, { fontSize: '13px', color: '#ffffff' });
            this.add.text(22, y + 24, `${f.weight.toFixed(2)} kg · 🪙${f.price} · ${f.rarity}`, { fontSize: '10px', color: '#888888' });

            const slot = this.add.rectangle(w / 2, y + 18, w - 20, 42).setInteractive({ useHandCursor: true });
            slot.on('pointerdown', () => this._showFishDetail(f));
        });

        this.add.text(w / 2, h - 40, `${fish.length} fish`, { fontSize: '11px', color: '#666666' }).setOrigin(0.5);

        if (fish.length === 0) {
            this.add.text(w / 2, h / 2, 'No fish in inventory.', { fontSize: '14px', color: '#555555' }).setOrigin(0.5);
        }
    }

    _showFishDetail(fish) {

class SettingsScene extends Phaser.Scene {
    constructor() { super({ key: 'SettingsScene' }); }

    create() {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;
        this.cameras.main.setBackgroundColor(0x1a2a3a);
        PlayerManager.load();
        const settings = PlayerManager.getSettings();

        this.add.text(w / 2, 30, '⚙️ SETTINGS', { fontSize: '22px', color: '#4ac5ff', fontStyle: 'bold' }).setOrigin(0.5);

        this._createSlider(w, 100, '🎵 Music Volume', settings.musicVolume, (val) => { settings.musicVolume = val; PlayerManager.save(); });
        this._createSlider(w, 170, '🔊 SFX Volume', settings.sfxVolume, (val) => { settings.sfxVolume = val; PlayerManager.save(); });

        this.add.text(w / 2, 240, '🌐 Language: English', { fontSize: '15px', color: '#cccccc' }).setOrigin(0.5);

        const resetBtn = this.add.text(w / 2, 320, '🗑️ Reset Save Data', {
            fontSize: '16px', color: '#ff6b6b', backgroundColor: '#2a1a1a',
            padding: { x: 18, y: 10 },
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        resetBtn.on('pointerdown', () => this._confirmReset(w, h));

        this.add.text(w / 2, h - 60, 'HOLD FISH v0.1.0', { fontSize: '11px', color: '#555555' }).setOrigin(0.5);

        this.add.text(20, h - 25, '← Back', { fontSize: '14px', color: '#888888' })
            .setInteractive({ useHandCursor: true }).on('pointerdown', () => this.scene.start('FishingHubScene'));
    }

    _createSlider(w, y, label, value, onChange) {
        this.add.text(20, y, label, { fontSize: '15px', color: '#cccccc' });
        const barX = w / 2 - 80;
        const barW = 200;
        const barBg = this.add.rectangle(w / 2, y + 5, barW, 10, 0x222233).setInteractive({ useHandCursor: true });
        const barFill = this.add.rectangle(barX - barW / 2, y + 5, (value / 100) * barW, 10, 0x4ac5ff).setOrigin(0, 0.5);
        const valText = this.add.text(w - 40, y, `${value}%`, { fontSize: '14px', color: '#ffd700' }).setOrigin(1, 0);

        barBg.on('pointerdown', (pointer) => {
            const relX = pointer.x - (barX - barW / 2);
            const pct = Math.max(0, Math.min(100, Math.round((relX / barW) * 100)));
            barFill.width = (pct / 100) * barW;
            valText.setText(`${pct}%`);
            onChange(pct);
        });
    }

    _confirmReset(w, h) {
        const dim = this.add.rectangle(w / 2, h / 2, w, h, 0x000000, 0.7).setInteractive();
        const panel = this.add.rectangle(w / 2, h / 2, w - 80, 160, 0x1a2a3a).setStrokeStyle(2, 0xff6b6b);
        const text = this.add.text(w / 2, h / 2 - 30, 'Delete all save data?', { fontSize: '16px', color: '#ff6b6b', fontStyle: 'bold' }).setOrigin(0.5);
        const sub = this.add.text(w / 2, h / 2 - 5, 'This cannot be undone.', { fontSize: '12px', color: '#888888' }).setOrigin(0.5);

        const yesBtn = this.add.text(w / 2 - 60, h / 2 + 40, 'Yes', {
            fontSize: '14px', color: '#ffffff', backgroundColor: '#aa3333',
            padding: { x: 16, y: 8 },
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        const noBtn = this.add.text(w / 2 + 60, h / 2 + 40, 'Cancel', {
            fontSize: '14px', color: '#ffffff', backgroundColor: '#333344',
            padding: { x: 16, y: 8 },
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        const cleanup = () => { dim.destroy(); panel.destroy(); text.destroy(); sub.destroy(); yesBtn.destroy(); noBtn.destroy(); };
        yesBtn.on('pointerdown', () => { cleanup(); localStorage.removeItem('holdfish_save'); this.scene.start('BootScene'); });
        noBtn.on('pointerdown', cleanup);
    }
}

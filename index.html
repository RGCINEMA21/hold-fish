<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>HOLD FISH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #fallback {
            display: none;
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="fallback">
        <p>🎣 HOLD FISH</p>
        <p style="margin-top:10px;font-size:14px;color:#aaa;">Loading game...</p>
        <p id="fallback-msg" style="margin-top:10px;font-size:12px;color:#666;"></p>
    </div>
    <script>
        // Fallback: tampilkan pesan jika game gagal load dalam 5 detik
        setTimeout(function() {
            var canvas = document.querySelector('canvas');
            if (!canvas) {
                document.getElementById('fallback').style.display = 'block';
                document.getElementById('fallback-msg').textContent = 'Game canvas not found. Check console for errors.';
            }
        }, 5000);
    </script>
    <link rel="stylesheet" href="/styles/style.css">
    <script type="module" src="/src/main.js"></script>
</body>
</html>

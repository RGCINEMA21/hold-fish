<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>HOLD FISH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #boot-msg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4ac5ff;
            font-family: sans-serif;
            font-size: 18px;
            z-index: 10;
            background: #0a0a1a;
            transition: opacity 0.3s;
        }
        #boot-msg.hidden {
            opacity: 0;
            pointer-events: none;
        }
        canvas {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="boot-msg">
            <div style="font-size:48px;margin-bottom:16px;">🎣</div>
            <div>HOLD FISH</div>
            <div style="font-size:12px;color:#667788;margin-top:8px;">Loading game...</div>
        </div>
    </div>
    <script>
        // Sembunyikan loading text begitu canvas muncul
        var checkCanvas = setInterval(function() {
            var canvas = document.querySelector('#game-container canvas');
            if (canvas) {
                clearInterval(checkCanvas);
                var bootMsg = document.getElementById('boot-msg');
                if (bootMsg) {
                    bootMsg.classList.add('hidden');
                    setTimeout(function() { bootMsg.remove(); }, 500);
                }
            }
        }, 100);
        
        // Error handler - hanya tampilkan error game, bukan extension
        window.addEventListener('error', function(e) {
            if (e.filename && e.filename.indexOf('extension') === -1 && e.filename.indexOf('chrome-extension') === -1) {
                var el = document.getElementById('boot-msg');
                if (el) {
                    el.style.color = '#ff6b6b';
                    el.innerHTML = 'ERROR: ' + e.message + '<br><small>' + e.filename + ':' + e.lineno + '</small>';
                }
            }
        });
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>

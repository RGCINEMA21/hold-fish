<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>HOLD FISH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            touch-action: none;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="boot-msg" style="color:#4ac5ff;text-align:center;padding-top:40vh;font-family:sans-serif;font-size:18px;">
            🎣 HOLD FISH - Loading...
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var el = document.getElementById('boot-msg');
            if (el) {
                el.style.color = '#ff6b6b';
                el.innerHTML = 'ERROR: ' + msg + '<br><small>' + (url||'') + ':' + line + '</small>';
            }
            return false;
        };
        setTimeout(function() {
            var el = document.getElementById('boot-msg');
            if (el && el.style.display !== 'none') {
                el.innerHTML = '🎣 HOLD FISH<br><small style="color:#888">Canvas may not have loaded. Check console.</small>';
            }
        }, 8000);
    </script>
</body>
</html>
